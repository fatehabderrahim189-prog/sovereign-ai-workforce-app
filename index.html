<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Sovereign AI Workforce — Autonomous AI agents that handle your email, scheduling, finance, reporting and compliance. Human-approved. Always.">
<title>Sovereign AI Workforce — Your Digital Workforce</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════════
   TOKENS
═══════════════════════════════════════════════════════ */
:root {
  --navy-900: #04060F;
  --navy-800: #080D1A;
  --navy-700: #0C1220;
  --navy-600: #0F1628;
  --navy-500: #1A2540;
  --navy-400: #243050;
  --navy-300: #2D3D65;
  --navy-200: #4A5E8A;
  --navy-100: #7A90B8;
  --navy-050: #C7D4EC;
  --amber:    #F59E0B;
  --amber-d:  #D97706;
  --amber-l:  #FDE68A;
  --blue:     #3B82F6;
  --blue-d:   #2563EB;
  --blue-l:   #93C5FD;
  --green:    #10B981;
  --green-d:  #059669;
  --red:      #EF4444;
  --purple:   #8B5CF6;
  --cyan:     #06B6D4;
  --white:    #FFFFFF;
  --mist:     #94A3B8;
  --mist-d:   #64748B;
  --text:     #E2E8F0;
  --text-dim: #94A3B8;
  --border:   #1A2540;
  --border-l: #243050;
  --r-sm: 8px;
  --r-md: 12px;
  --r-lg: 16px;
  --r-xl: 20px;
}

/* ═══════════════════════════════════════════════════════
   RESET & BASE
═══════════════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Inter', sans-serif;
  background: var(--navy-900);
  color: var(--text);
  line-height: 1.6;
  overflow-x: hidden;
}
img { max-width: 100%; }
a { color: inherit; text-decoration: none; }
button { cursor: pointer; font-family: inherit; }

/* ═══════════════════════════════════════════════════════
   TYPOGRAPHY
═══════════════════════════════════════════════════════ */
.display { font-family: 'Space Grotesk', sans-serif; }
.mono    { font-family: 'JetBrains Mono', monospace; }

/* ═══════════════════════════════════════════════════════
   LAYOUT
═══════════════════════════════════════════════════════ */
.container { max-width: 1120px; margin: 0 auto; padding: 0 32px; }
.container-wide { max-width: 1280px; margin: 0 auto; padding: 0 32px; }

/* ═══════════════════════════════════════════════════════
   EYEBROW / LABEL
═══════════════════════════════════════════════════════ */
.eyebrow {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--amber);
  padding: 5px 14px;
  border: 1px solid rgba(245,158,11,.25);
  border-radius: 20px;
  background: rgba(245,158,11,.06);
  margin-bottom: 20px;
}

/* ═══════════════════════════════════════════════════════
   BUTTONS
═══════════════════════════════════════════════════════ */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 700;
  font-size: 14px;
  border: none;
  border-radius: var(--r-md);
  padding: 13px 24px;
  transition: all .18s ease;
  white-space: nowrap;
}
.btn-primary {
  background: var(--amber);
  color: var(--navy-900);
}
.btn-primary:hover { background: var(--amber-d); transform: translateY(-1px); box-shadow: 0 8px 24px rgba(245,158,11,.3); }
.btn-ghost {
  background: transparent;
  border: 1.5px solid var(--border-l);
  color: var(--text);
}
.btn-ghost:hover { border-color: var(--amber); color: var(--amber); }
.btn-lg { padding: 16px 32px; font-size: 16px; border-radius: var(--r-lg); }
.btn-sm { padding: 9px 16px; font-size: 13px; }

/* ═══════════════════════════════════════════════════════
   NAV
═══════════════════════════════════════════════════════ */
nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  padding: 0 32px;
  height: 64px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: rgba(4,6,15,.82);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  transition: background .3s;
}
.nav-brand {
  display: flex;
  align-items: center;
  gap: 10px;
}
.nav-mark {
  width: 32px; height: 32px;
  background: linear-gradient(135deg, var(--amber), var(--amber-d));
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; color: var(--navy-900); font-weight: 900;
  font-family: 'Space Grotesk', sans-serif;
}
.nav-name {
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 800;
  font-size: 15px;
  color: var(--white);
}
.nav-links {
  display: flex;
  align-items: center;
  gap: 32px;
  list-style: none;
}
.nav-links a {
  font-size: 14px;
  color: var(--text-dim);
  transition: color .15s;
}
.nav-links a:hover { color: var(--text); }
.nav-ctas { display: flex; gap: 10px; align-items: center; }

/* ═══════════════════════════════════════════════════════
   SECTION BASE
═══════════════════════════════════════════════════════ */
section { position: relative; }

/* ═══════════════════════════════════════════════════════
   ── 1. HERO
═══════════════════════════════════════════════════════ */
#hero {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 120px 0 80px;
  background: var(--navy-900);
  overflow: hidden;
}
.hero-bg {
  position: absolute;
  inset: 0;
  pointer-events: none;
}
.hero-radial {
  position: absolute;
  width: 900px; height: 900px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(245,158,11,.06) 0%, transparent 70%);
  top: -200px; left: 50%; transform: translateX(-50%);
}
.hero-grid {
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,.015) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.015) 1px, transparent 1px);
  background-size: 60px 60px;
  mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 40%, transparent 100%);
}
.hero-inner {
  position: relative;
  text-align: center;
  max-width: 900px;
  margin: 0 auto;
  padding: 0 32px;
}
.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(245,158,11,.08);
  border: 1px solid rgba(245,158,11,.2);
  border-radius: 20px;
  padding: 6px 16px 6px 8px;
  margin-bottom: 28px;
  font-size: 13px;
  color: var(--amber);
}
.hero-badge-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--green);
  animation: pulse-dot 2s infinite;
}
@keyframes pulse-dot {
  0%, 100% { box-shadow: 0 0 0 0 rgba(16,185,129,.5); }
  50% { box-shadow: 0 0 0 6px rgba(16,185,129,0); }
}
.hero-h1 {
  font-family: 'Space Grotesk', sans-serif;
  font-size: clamp(42px, 7vw, 80px);
  font-weight: 800;
  line-height: 1.05;
  letter-spacing: -2px;
  color: var(--white);
  margin-bottom: 24px;
}
.hero-h1 .accent { color: var(--amber); }
.hero-h1 .dim { color: var(--navy-100); }
.hero-sub {
  font-size: clamp(16px, 2vw, 20px);
  color: var(--text-dim);
  max-width: 620px;
  margin: 0 auto 40px;
  line-height: 1.7;
  font-weight: 300;
}
.hero-ctas {
  display: flex;
  justify-content: center;
  gap: 14px;
  flex-wrap: wrap;
  margin-bottom: 64px;
}
.hero-stats {
  display: flex;
  justify-content: center;
  gap: 48px;
  flex-wrap: wrap;
}
.hero-stat-val {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 30px;
  font-weight: 800;
  color: var(--amber);
  line-height: 1;
}
.hero-stat-lab {
  font-size: 12px;
  color: var(--text-dim);
  margin-top: 4px;
}

/* Live pipeline demo in hero */
.hero-pipeline {
  margin: 56px auto 0;
  max-width: 820px;
  padding: 0 32px;
}
.pipeline-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--mist-d);
  letter-spacing: 1px;
  text-align: left;
  margin-bottom: 12px;
  text-transform: uppercase;
}
.pipeline-track {
  background: var(--navy-800);
  border: 1px solid var(--border);
  border-radius: var(--r-xl);
  padding: 20px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  overflow-x: auto;
}
.p-node {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  min-width: 72px;
  flex: 1;
}
.p-icon {
  width: 44px; height: 44px;
  border-radius: 50%;
  border: 2px solid var(--border-l);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  background: var(--navy-700);
  transition: all .4s ease;
  position: relative;
}
.p-icon.active {
  border-color: var(--node-color, var(--amber));
  box-shadow: 0 0 0 4px color-mix(in srgb, var(--node-color, var(--amber)) 20%, transparent);
}
.p-icon.done {
  border-color: var(--node-color, var(--green));
  background: color-mix(in srgb, var(--node-color, var(--green)) 12%, var(--navy-700));
}
.p-label {
  font-size: 10px;
  color: var(--mist-d);
  text-align: center;
  font-weight: 600;
  letter-spacing: .3px;
  transition: color .3s;
}
.p-label.active, .p-label.done { color: var(--text); }
.p-arrow {
  font-size: 14px;
  color: var(--border-l);
  flex-shrink: 0;
  transition: color .4s;
}
.p-arrow.lit { color: var(--green); }
.p-output {
  background: var(--navy-700);
  border: 1px solid var(--border-l);
  border-radius: var(--r-md);
  padding: 14px 18px;
  margin-top: 12px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: var(--text-dim);
  min-height: 52px;
  line-height: 1.7;
  text-align: left;
}
.p-output .typed { color: var(--green); }
.streaming-dots::after {
  content: '▋';
  color: var(--blue);
  animation: blink .7s step-end infinite;
}
@keyframes blink { 50% { opacity: 0; } }
.approval-strip {
  margin-top: 16px;
  background: rgba(245,158,11,.06);
  border: 1px solid rgba(245,158,11,.25);
  border-radius: var(--r-md);
  padding: 12px 18px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}
.approval-text {
  font-size: 13px;
  color: var(--text);
}
.approval-text strong { color: var(--amber); }
.approve-btn {
  background: var(--amber);
  color: var(--navy-900);
  border: none;
  border-radius: 8px;
  padding: 8px 18px;
  font-size: 12px;
  font-weight: 800;
  font-family: 'Space Grotesk', sans-serif;
  cursor: pointer;
  white-space: nowrap;
  transition: all .15s;
}
.approve-btn:hover { background: var(--amber-d); }
.approved-badge {
  display: none;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  color: var(--green);
  font-weight: 700;
}

/* ═══════════════════════════════════════════════════════
   ── 2. PROBLEM
═══════════════════════════════════════════════════════ */
#problem {
  padding: 120px 0;
  background: var(--navy-800);
  border-top: 1px solid var(--border);
}
.problem-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 80px;
  align-items: center;
}
.problem-h2 {
  font-family: 'Space Grotesk', sans-serif;
  font-size: clamp(30px, 4vw, 46px);
  font-weight: 800;
  line-height: 1.1;
  letter-spacing: -1px;
  color: var(--white);
  margin-bottom: 20px;
}
.problem-body {
  font-size: 17px;
  color: var(--text-dim);
  line-height: 1.8;
  margin-bottom: 32px;
  font-weight: 300;
}
.pain-list {
  display: flex;
  flex-direction: column;
  gap: 14px;
  list-style: none;
}
.pain-item {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  padding: 16px 18px;
  background: var(--navy-700);
  border: 1px solid var(--border-l);
  border-left: 3px solid var(--red);
  border-radius: var(--r-md);
}
.pain-icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }
.pain-text { font-size: 14px; color: var(--text); line-height: 1.6; }
.pain-text strong { color: var(--white); display: block; margin-bottom: 2px; }
.stat-cards {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}
.stat-card {
  background: var(--navy-700);
  border: 1px solid var(--border-l);
  border-radius: var(--r-lg);
  padding: 24px;
  text-align: center;
}
.stat-card-val {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 44px;
  font-weight: 800;
  color: var(--red);
  line-height: 1;
  margin-bottom: 8px;
}
.stat-card-val.amber { color: var(--amber); }
.stat-card-val.blue  { color: var(--blue); }
.stat-card-val.green { color: var(--green); }
.stat-card-lab { font-size: 13px; color: var(--text-dim); line-height: 1.5; }
.stat-card-src { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--mist-d); margin-top: 6px; }

/* ═══════════════════════════════════════════════════════
   ── 3. SOLUTION
═══════════════════════════════════════════════════════ */
#solution {
  padding: 120px 0;
  background: var(--navy-900);
  text-align: center;
}
.section-h2 {
  font-family: 'Space Grotesk', sans-serif;
  font-size: clamp(30px, 4vw, 48px);
  font-weight: 800;
  line-height: 1.1;
  letter-spacing: -1.5px;
  color: var(--white);
  margin-bottom: 16px;
}
.section-sub {
  font-size: clamp(15px, 2vw, 18px);
  color: var(--text-dim);
  max-width: 620px;
  margin: 0 auto 60px;
  line-height: 1.75;
  font-weight: 300;
}
.solution-pillars {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
  margin-top: 60px;
}
.pillar {
  background: var(--navy-800);
  border: 1px solid var(--border);
  border-radius: var(--r-xl);
  padding: 36px 28px;
  text-align: left;
  transition: border-color .2s, transform .2s;
}
.pillar:hover { border-color: var(--border-l); transform: translateY(-4px); }
.pillar-num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--amber);
  letter-spacing: 2px;
  margin-bottom: 16px;
  display: block;
}
.pillar-icon { font-size: 28px; margin-bottom: 16px; display: block; }
.pillar-h3 {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 20px;
  font-weight: 700;
  color: var(--white);
  margin-bottom: 10px;
}
.pillar-p { font-size: 14px; color: var(--text-dim); line-height: 1.7; }

/* ═══════════════════════════════════════════════════════
   ── 4. HOW IT WORKS
═══════════════════════════════════════════════════════ */
#how {
  padding: 120px 0;
  background: var(--navy-800);
  border-top: 1px solid var(--border);
}
.steps-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 0;
  position: relative;
  margin-top: 60px;
}
.steps-grid::before {
  content: '';
  position: absolute;
  top: 32px; left: 10%; right: 10%;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--border-l), var(--amber), var(--border-l), transparent);
}
.step {
  text-align: center;
  padding: 0 20px;
  position: relative;
}
.step-num {
  width: 64px; height: 64px;
  border-radius: 50%;
  background: var(--navy-700);
  border: 2px solid var(--amber);
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 20px;
  font-family: 'Space Grotesk', sans-serif;
  font-size: 20px;
  font-weight: 800;
  color: var(--amber);
  position: relative;
  z-index: 1;
}
.step-h3 {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 17px;
  font-weight: 700;
  color: var(--white);
  margin-bottom: 10px;
}
.step-p { font-size: 13.5px; color: var(--text-dim); line-height: 1.65; }
.step-tag {
  display: inline-block;
  margin-top: 12px;
  padding: 4px 10px;
  background: rgba(16,185,129,.1);
  border: 1px solid rgba(16,185,129,.25);
  border-radius: 20px;
  font-size: 11px;
  color: var(--green);
  font-family: 'JetBrains Mono', monospace;
}

/* ═══════════════════════════════════════════════════════
   ── 5. WORKFORCE OVERVIEW
═══════════════════════════════════════════════════════ */
#workforce {
  padding: 120px 0;
  background: var(--navy-900);
}
.workforce-intro {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 80px;
  align-items: center;
  margin-bottom: 80px;
}
.workforce-numbers {
  display: flex;
  flex-direction: column;
  gap: 20px;
}
.w-num-row {
  display: flex;
  align-items: baseline;
  gap: 16px;
  padding: 20px 0;
  border-bottom: 1px solid var(--border);
}
.w-num-row:last-child { border-bottom: none; }
.w-big {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 48px;
  font-weight: 800;
  line-height: 1;
  min-width: 80px;
}
.w-text { font-size: 15px; color: var(--text-dim); line-height: 1.6; }
.w-text strong { color: var(--text); display: block; margin-bottom: 2px; }

/* ═══════════════════════════════════════════════════════
   ── 6. AGENT SHOWCASE
═══════════════════════════════════════════════════════ */
#agents {
  padding: 120px 0;
  background: var(--navy-800);
  border-top: 1px solid var(--border);
}
.agents-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 12px;
  margin-top: 56px;
}
.agent-card {
  background: var(--navy-700);
  border: 1px solid var(--border-l);
  border-radius: var(--r-lg);
  padding: 20px 14px;
  text-align: center;
  transition: all .2s ease;
  cursor: pointer;
  position: relative;
  overflow: hidden;
}
.agent-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: var(--agent-color, var(--amber));
  transform: scaleX(0);
  transition: transform .2s;
}
.agent-card:hover::before { transform: scaleX(1); }
.agent-card:hover {
  border-color: var(--agent-color, var(--amber));
  transform: translateY(-4px);
  box-shadow: 0 12px 32px rgba(0,0,0,.4);
}
.agent-emoji { font-size: 28px; margin-bottom: 10px; display: block; }
.agent-name {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 12px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 6px;
}
.agent-role {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9.5px;
  color: var(--agent-color, var(--amber));
  border: 1px solid;
  border-color: color-mix(in srgb, var(--agent-color, var(--amber)) 35%, transparent);
  padding: 2px 7px;
  border-radius: 10px;
}
/* Agent detail panel below the grid */
.agent-detail {
  margin-top: 24px;
  background: var(--navy-700);
  border: 1px solid var(--border-l);
  border-radius: var(--r-xl);
  padding: 28px 32px;
  display: none;
}
.agent-detail.open { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 24px; }
.ad-section-title {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--mist-d);
  margin-bottom: 10px;
}
.ad-output {
  background: var(--navy-800);
  border-radius: var(--r-md);
  padding: 14px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11.5px;
  color: var(--green);
  line-height: 1.75;
  min-height: 90px;
}
.ad-tools { display: flex; flex-direction: column; gap: 7px; }
.ad-tool {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  color: var(--text-dim);
}
